version: "2"
output:
  formats:
    text:
      path: stdout
linters:
  enable:
    - goconst
    - gocritic
    - gocyclo
    - misspell
    - nakedret
    - revive
    - unconvert
  settings:
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - fmt:.*
        - io/ioutil:^Read.*
    exhaustive:
      default-signifies-exhaustive: true
    goconst:
      min-len: 3
      min-occurrences: 5
    gocritic:
      enabled-tags:
        - performance
      settings:
        captLocal:
          paramsOnly: true
        rangeValCopy:
          sizeThreshold: 32
    gocyclo:
      min-complexity: 30
    lll:
      tab-width: 1
    makezero:
      always: false
    nakedret:
      max-func-lines: 30
    unparam:
      check-exported: false
  exclusions:
    generated: lax
    rules:
      - linters:
          - dupl
          - errcheck
          - exportloopref
          - gocyclo
          - gosec
          - unparam
        path: _test(ing)?\.go
      - linters:
          - gocritic
        path: _test\.go
        text: (unnamedResult|exitAfterDefer)
      - linters:
          - gocritic
        text: '(hugeParam|rangeValCopy):'
      - linters:
          - staticcheck
        text: 'SA3000:'
      - linters:
          - revive
        text: 'package-comments: should have a package comment'
      - linters:
          - gosec
        text: 'G101:'
      - linters:
          - gosec
        text: 'G104:'
      - linters:
          - errcheck
        text: \.AddToUserAgent
      - linters:
          - revive
        text: don't use an underscore
      # TODO: fix in a follow-up PR. The findings below are pre-existing and
      # were newly surfaced by the golangci-lint v2 upgrade (stricter
      # defaults / merged gosimple checks into staticcheck), not introduced
      # by this change.
      - linters:
          - goconst
        text: 'occurrences, make it a constant'
      - linters:
          - staticcheck
        text: 'QF1008:'
      - linters:
          - staticcheck
        text: 'QF1007:'
      - linters:
          - revive
        text: 'unused-parameter'
      # staticcheck.conf already ignores SA1019 repo-wide for CUE-upgrade
      # reasons, but golangci-lint's staticcheck doesn't read that file.
      # Mirror the same exclusion here so both tools agree.
      - linters:
          - staticcheck
        text: 'SA1019:'
    paths:
      - zz_generated\..+\.go$
      - .*_test.go$
      - hack
      - e2e
      - third_party$
      - builtin$
      - examples$
issues:
  max-same-issues: 0
  new: false
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/oam-dev/kubevela
  exclusions:
    generated: lax
    paths:
      - zz_generated\..+\.go$
      - .*_test.go$
      - hack
      - e2e
      - third_party$
      - builtin$
      - examples$
